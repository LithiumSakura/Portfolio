<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Lisa McKenzie Portfolio{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="{{ url_for('home') }}">Menu</a>
    <div class="nav-links">
      <a href="{{ url_for('home') }}" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">Home</a>
      <a href="{{ url_for('projects') }}" class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}">Projects</a>
      <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About Me</a>
      <a href="{{ url_for('resume') }}" class="nav-link {% if request.endpoint == 'resume' %}active{% endif %}">Resume</a>
    </div>
  </nav>
  
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/web.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
